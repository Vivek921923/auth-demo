name: CI + Docker Pipeline

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "21"

      # 3️⃣ Cache Maven dependencies (fast build ⚡)
      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      # 4️⃣ Give permission to mvnw
      - name: Give permission
        run: chmod +x mvnw

      # 5️⃣ Build project (skip tests for now)
      - name: Build with Maven
        run: ./mvnw clean install -DskipTests

      # 🐳 6️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t authotp-app .

      # 🔐 7️⃣ Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 📦 8️⃣ Tag Docker Image
      - name: Tag Docker Image
        run: docker tag authotp-app ${{ secrets.DOCKER_USERNAME }}/authotp-app

      # 🚀 9️⃣ Push Docker Image
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/authotp-app
